name: Publish Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Apply
        env:
          A4DFFC: ${{ secrets.A4DFFC }}
          B314F8: ${{ secrets.B314F8 }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" _site
          python3 -c "
          import sys, os, pathlib
          pairs = [('A4DFFC', '<!-- 32d5700bb5d484252fe1721a7be7d098e1fd82b42499 -->'), ('B314F8', '<!-- 26e0c984cb336b96 -->')]
          found = 0
          for path in pathlib.Path('_site').rglob('*.html'):
              try:
                  data = path.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              result = data
              for key, mark in pairs:
                  token = os.environ.get(key, '')
                  if token:
                      result = result.replace(mark, token)
              if result != data:
                  path.write_text(result, encoding='utf-8')
                  found += 1
          if found == 0 and any(os.environ.get(k, '') for k, _ in pairs):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
